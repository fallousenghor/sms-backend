services:
  - type: web
    name: sms-bulk-backend
    env: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: SMS_BATCH_SIZE
        value: 10
      - key: SMS_BATCH_DELAY_MS
        value: 1000
      - key: CORS_ORIGIN
        sync: false
