version: '3.9'

# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    build:
      target: builder
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sms_bulk
      JWT_SECRET: dev_secret_change_in_production_32chars
      JWT_EXPIRES_IN: 7d
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-ACtest}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-testtoken}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-+15005550006}
      CORS_ORIGIN: http://localhost:5173,http://localhost:3001
      SMS_BATCH_SIZE: 5
    ports:
      - '3000:3000'
      - '9229:9229'  # Node.js debugger
